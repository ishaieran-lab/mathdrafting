[build]
  publish = "src"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "http://mathdrafting.com/*"
  to = "https://mathdrafting.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.mathdrafting.com/*"
  to = "https://mathdrafting.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/app/index.html"
  status = 200
